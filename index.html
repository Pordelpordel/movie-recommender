<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 سینماچی</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            color: white;
        }
        .header h1 { font-size: 2.5rem; }
        .header h1 span { color: #ffd700; }
        .header .badge-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .header .badge {
            background: rgba(255,215,0,0.15);
            padding: 5px 16px;
            border-radius: 50px;
            color: #ffd700;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .header .logout-btn {
            background: rgba(255,0,0,0.2);
            border: 1px solid rgba(255,0,0,0.3);
            color: #ff6b6b;
            padding: 5px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px solid rgba(255,0,0,0.3);
            display: none;
        }
        .header .logout-btn:hover { background: rgba(255,0,0,0.4); }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 30px;
            max-width: 400px;
            width: 90%;
            color: white;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-box h2 { color: #ffd700; font-size: 1.8rem; margin-bottom: 10px; }
        .login-box p { color: rgba(255,255,255,0.6); margin-bottom: 20px; }
        .login-box input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .login-box input:focus {
            border-color: #ffd700;
            outline: none;
        }
        .login-box .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ffd700, #f9a825);
            color: #1a1a2e;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .login-box .login-btn:hover { transform: scale(1.02); }
        .login-box .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 18px;
            margin-top: 15px;
        }
        .movie-card {
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            border-radius: 18px;
            padding: 12px;
            color: white;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .movie-card:hover { transform: translateY(-5px); }
        .movie-card h3 { color: #ffd700; margin: 6px 0; font-size: 0.95rem; }
        .movie-card .genre-tag {
            background: rgba(255,255,255,0.15);
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            display: inline-block;
        }
        .movie-card .rating { color: #ffd700; font-weight: bold; margin: 4px 0; }
        .movie-poster {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 6px;
            background: #1a1a2e;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            margin-top: 3px;
        }
        .status-badge.showing { background: #4caf50; color: white; }
        .status-badge.released { background: #2196f3; color: white; }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .btn-primary:hover { transform: scale(1.05); }

        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            align-items: center;
        }
        .filter-bar select, .filter-bar input {
            padding: 6px 12px;
            border-radius: 50px;
            border: 2px solid #e0e0e0;
            background: white;
            font-size: 0.8rem;
            min-width: 100px;
        }
        .filter-bar input[type="text"] { flex: 1; min-width: 120px; }

        .tab-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.85);
            border: none;
            border-radius: 50px;
            color: #555;
            cursor: pointer;
            font-weight: bold;
            margin: 3px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 25px;
            min-height: 300px;
        }
        .tab-content.active { display: block; }

        .footer {
            background: rgba(0,0,0,0.3);
            border-radius: 25px;
            margin-top: 30px;
            padding: 20px;
            color: rgba(255,255,255,0.5);
            text-align: center;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1a1a2e;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 5000;
            border-right: 4px solid #ffd700;
        }
        .empty-state {
            text-align: center;
            padding: 40px 15px;
            color: #888;
        }
        .empty-state .icon { font-size: 3rem; display: block; }
        .empty-state h3 { color: #aaa; }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .movie-poster { height: 150px; }
        }
        @media (max-width: 480px) {
            .movies-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .movie-poster { height: 120px; }
            .movie-card h3 { font-size: 0.8rem; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- ===== صفحه ورود ===== -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🎬 سینماچی</h2>
            <p>با ایمیل خود وارد شوید</p>
            <input type="email" id="loginEmail" placeholder="example@gmail.com">
            <button class="login-btn" onclick="loginUser()">🚀 ورود</button>
            <div class="error-msg" id="loginError">لطفاً ایمیل معتبر وارد کنید</div>
        </div>
    </div>

    <div class="container">
        <!-- ===== هدر ===== -->
        <div class="header">
            <h1>🎬 <span>سینماچی</span></h1>
            <div class="badge-group">
                <span class="badge">🎬 <span id="movieCount">0</span> فیلم</span>
                <span class="badge">👤 <span id="headerUser">مهمان</span></span>
                <button class="logout-btn" onclick="logoutUser()" id="logoutBtn">🚪 خروج</button>
            </div>
        </div>

        <!-- ===== تب‌ها ===== -->
        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:25px; justify-content:center;">
            <button class="tab-btn active" onclick="showTab('movies')">🎬 فیلم‌ها</button>
            <button class="tab-btn" onclick="showTab('add')">➕ افزودن</button>
        </div>

        <!-- ===== تب فیلم‌ها ===== -->
        <div id="movies" class="tab-content active">
            <h2>🎬 گنجینه فیلم‌ها</h2>
            <div class="filter-bar">
                <button class="btn-primary" onclick="applyFilters()">🔄 بارگیری</button>
                <select id="filterGenre" onchange="applyFilters()">
                    <option value="">همه ژانرها</option>
                    <option>درام</option><option>اکشن</option><option>کمدی</option>
                    <option>عاشقانه</option><option>علمی تخیلی</option><option>جنایی</option>
                </select>
                <input type="text" id="searchInputQuick" placeholder="🔍 جستجوی سریع..." oninput="applyFilters()">
            </div>
            <div id="moviesList" class="movies-grid"></div>
        </div>

        <!-- ===== تب افزودن ===== -->
        <div id="add" class="tab-content">
            <h2>➕ افزودن فیلم</h2>
            <div style="display:flex; flex-direction:column; gap:10px; max-width:500px;">
                <input type="text" id="newName" placeholder="نام فیلم" style="padding:8px 12px; border-radius:12px; border:2px solid #e0e0e0;">
                <select id="newGenre" style="padding:8px 12px; border-radius:12px; border:2px solid #e0e0e0;">
                    <option>درام</option><option>اکشن</option><option>کمدی</option>
                    <option>عاشقانه</option><option>علمی تخیلی</option><option>جنایی</option>
                </select>
                <input type="number" id="newRating" placeholder="امتیاز (0-10)" step="0.1" min="0" max="10" style="padding:8px 12px; border-radius:12px; border:2px solid #e0e0e0;">
                <input type="text" id="newYear" placeholder="سال (مثال: ۲۰۲۴)" style="padding:8px 12px; border-radius:12px; border:2px solid #e0e0e0;">
                <button class="btn-primary" onclick="addMovie()">➕ افزودن فیلم</button>
                <div id="addResult" style="margin-top:10px;"></div>
            </div>
        </div>

        <!-- ===== فوتر ===== -->
        <footer class="footer">
            <p>© ۱۴۰۴ تمامی حقوق برای <strong>سینماچی</strong> محفوظ است.</p>
        </footer>
    </div>

    <script>
        // =============================================
        // تنظیمات
        // =============================================
        let currentUser = null;
        let movies = [];
        const STORAGE_PREFIX = 'cinemachi_';

        // =============================================
        // توابع ذخیره‌سازی
        // =============================================
        function getStorageKey(email, type) {
            const safeEmail = email.replace(/[@.]/g, '_');
            return `${STORAGE_PREFIX}${safeEmail}_${type}`;
        }

        function loadMoviesFromStorage() {
            if (!currentUser) {
                // فیلم‌های پیش‌فرض برای مهمان
                movies = getDefaultMovies();
                return;
            }
            const saved = localStorage.getItem(getStorageKey(currentUser, 'movies'));
            if (saved) {
                try {
                    movies = JSON.parse(saved);
                    return;
                } catch(e) {}
            }
            movies = getDefaultMovies();
            saveMovies();
        }

        function saveMovies() {
            if (!currentUser) return;
            localStorage.setItem(getStorageKey(currentUser, 'movies'), JSON.stringify(movies));
            updateCounts();
        }

        function getDefaultMovies() {
            return [
                { id: 1, name: "رستگاری در شاوشنک", genre: "درام", rating: 9.3, year: "۱۹۹۴", poster: "https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg", status: "released" },
                { id: 2, name: "پدرخوانده", genre: "جنایی", rating: 9.2, year: "۱۹۷۲", poster: "https://image.tmdb.org/t/p/w500/rPdtLWNsZmAtoZl9PK7S2wE3qiS.jpg", status: "released" },
                { id: 3, name: "شوالیه تاریکی", genre: "اکشن", rating: 9.0, year: "۲۰۰۸", poster: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg", status: "released" },
                { id: 4, name: "فارست گامپ", genre: "درام", rating: 8.8, year: "۱۹۹۴", poster: "https://image.tmdb.org/t/p/w500/saHP97rTPS5eLmrLQEcANmKrsFl.jpg", status: "released" },
                { id: 5, name: "تلقین", genre: "علمی تخیلی", rating: 8.8, year: "۲۰۱۰", poster: "https://image.tmdb.org/t/p/w500/qmDpIHrmpJINaRKAfWQfftjCdyi.jpg", status: "released" },
                { id: 6, name: "ماتریکس", genre: "علمی تخیلی", rating: 8.7, year: "۱۹۹۹", poster: "https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg", status: "released" },
                { id: 7, name: "اینتراستلار", genre: "علمی تخیلی", rating: 8.6, year: "۲۰۱۴", poster: "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg", status: "released" },
                { id: 8, name: "تایتانیک", genre: "عاشقانه", rating: 8.5, year: "۱۹۹۷", poster: "https://image.tmdb.org/t/p/w500/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg", status: "released" }
            ];
        }

        // =============================================
        // توابع احراز هویت
        // =============================================
        function loginUser() {
            const email = document.getElementById('loginEmail').value.trim();
            if (!email || !email.includes('@') || !email.includes('.')) {
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            document.getElementById('loginError').style.display = 'none';
            
            currentUser = email;
            localStorage.setItem('cinemachi_current_user', email);
            
            loadMoviesFromStorage();
            document.getElementById('loginOverlay').style.display = 'none';
            updateHeaderUser();
            applyFilters();
            updateCounts();
            showToast(`👋 خوش آمدید ${email.split('@')[0]}`);
        }

        function logoutUser() {
            if (!confirm('آیا می‌خواهید خارج شوید؟')) return;
            currentUser = null;
            localStorage.removeItem('cinemachi_current_user');
            movies = [];
            document.getElementById('loginOverlay').style.display = 'flex';
            updateHeaderUser();
            applyFilters();
            updateCounts();
            showToast('🚪 خارج شدید');
        }

        function updateHeaderUser() {
            const userSpan = document.getElementById('headerUser');
            const logoutBtn = document.getElementById('logoutBtn');
            if (currentUser) {
                userSpan.textContent = currentUser.split('@')[0];
                logoutBtn.style.display = 'inline-block';
            } else {
                userSpan.textContent = 'مهمان';
                logoutBtn.style.display = 'none';
            }
        }

        // =============================================
        // توابع نمایش فیلم‌ها
        // =============================================
        function updateCounts() {
            document.getElementById('movieCount').textContent = movies ? movies.length : 0;
        }

        function getStatusText(status) {
            const map = { showing: '🟢 در حال اکران', released: '🔵 اکران شده' };
            return map[status] || status;
        }

        function getStatusClass(status) {
            return status === 'showing' ? 'showing' : 'released';
        }

        function getRatingEmoji(rating) {
            if (rating >= 9) return '🌟';
            if (rating >= 8) return '⭐';
            if (rating >= 7) return '👍';
            return '😐';
        }

        function displayMovies(moviesList, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            if (!moviesList || moviesList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">🎬</span>
                        <h3>هیچ فیلمی پیدا نشد</h3>
                    </div>
                `;
                return;
            }
            container.innerHTML = moviesList.map(m => {
                const poster = m.poster && m.poster.startsWith('http') ? m.poster : 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22450%22%3E%3Crect fill=%22%231a1a2e%22 width=%22300%22 height=%22450%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23666%22 font-size=%2230%22 font-family=%22sans-serif%22%3E🎬%3C/text%3E%3C/svg%3E';
                const emoji = getRatingEmoji(m.rating);
                const statusClass = getStatusClass(m.status);
                const statusText = getStatusText(m.status);
                return `
                    <div class="movie-card">
                        <img class="movie-poster" src="${poster}" alt="${m.name}" loading="lazy">
                        <h3>${m.name}</h3>
                        <div class="genre-tag">🎭 ${m.genre}</div>
                        <div class="rating">${emoji} ${m.rating}/10</div>
                        ${m.year ? `<div style="font-size:0.7rem; opacity:0.7;">📅 ${m.year}</div>` : ''}
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                `;
            }).join('');
        }

        function applyFilters() {
            if (!movies || movies.length === 0) {
                displayMovies([], 'moviesList');
                return;
            }
            
            const genre = document.getElementById('filterGenre').value;
            const search = document.getElementById('searchInputQuick').value.trim().toLowerCase();

            let filtered = [...movies];

            if (genre) filtered = filtered.filter(m => m.genre === genre);
            if (search) filtered = filtered.filter(m => m.name.toLowerCase().includes(search));

            displayMovies(filtered, 'moviesList');
        }

        // =============================================
        // تب‌ها
        // =============================================
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => {
                if (b.textContent.includes(
                    tabName === 'movies' ? 'فیلم‌ها' :
                    tabName === 'add' ? 'افزودن' : ''
                )) b.classList.add('active');
            });
            if (tabName === 'movies') applyFilters();
        }

        // =============================================
        // افزودن دستی
        // =============================================
        function addMovie() {
            const name = document.getElementById('newName').value.trim();
            const genre = document.getElementById('newGenre').value;
            const rating = parseFloat(document.getElementById('newRating').value);
            const year = document.getElementById('newYear').value.trim();

            if (!name) { showToast('❌ لطفاً نام فیلم را وارد کنید'); return; }
            if (isNaN(rating) || rating < 0 || rating > 10) { showToast('❌ امتیاز باید بین ۰ تا ۱۰ باشد'); return; }

            const newMovie = {
                id: movies.length > 0 ? Math.max(...movies.map(m => m.id)) + 1 : 1,
                name: name,
                genre: genre,
                rating: rating,
                year: year || 'نامشخص',
                poster: '',
                status: 'released'
            };

            movies.push(newMovie);
            saveMovies();
            applyFilters();
            showToast(`🎬 فیلم "${name}" با موفقیت اضافه شد!`);
            document.getElementById('newName').value = '';
            document.getElementById('newRating').value = '';
            document.getElementById('newYear').value = '';
            document.getElementById('addResult').innerHTML = '<div style="color:#4caf50; font-weight:bold;">✅ فیلم با موفقیت اضافه شد!</div>';
            setTimeout(() => document.getElementById('addResult').innerHTML = '', 3000);
        }

        // =============================================
        // توابع کمکی
        // =============================================
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // =============================================
        // ورود با Enter
        // =============================================
        document.getElementById('loginEmail').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginUser();
            }
        });

        // =============================================
        // راه‌اندازی
        // =============================================
        function init() {
            const savedUser = localStorage.getItem('cinemachi_current_user');
            if (savedUser) {
                currentUser = savedUser;
                loadMoviesFromStorage();
                document.getElementById('loginOverlay').style.display = 'none';
                updateHeaderUser();
                applyFilters();
                updateCounts();
                console.log(`👋 خوش آمدید ${savedUser.split('@')[0]}`);
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
            }
            console.log('🎬 سینماچی با موفقیت بارگذاری شد!');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
