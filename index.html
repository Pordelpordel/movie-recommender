<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 سینماچی - سیستم توصیه‌گر فیلم</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazir&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', 'Tahoma', 'Segoe UI', Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* User Section */
        .user-section {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Modal برای ورود و ثبت‌نام */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .modal-content input {
            margin-bottom: 15px;
        }

        .modal-content button {
            width: 100%;
            margin-top: 10px;
        }

        .switch-mode {
            margin-top: 15px;
            color: #666;
            cursor: pointer;
        }

        .switch-mode:hover {
            color: #ff6b6b;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .header h1 span {
            color: #ffd700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
            color: #1a1a2e;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }

        /* Content */
        .tab-content {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #1a1a2e;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255,107,107,0.3);
        }

        button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
            color: #1a1a2e;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Movie Cards */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .movie-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.4s;
            cursor: pointer;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .movie-card::before {
            content: '🎬';
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 80px;
            opacity: 0.1;
            pointer-events: none;
        }

        .movie-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .movie-card h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #ffd93d;
        }

        .movie-card .genre {
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .movie-card .rating {
            color: #ffd93d;
            font-size: 1.4rem;
            font-weight: bold;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #666;
        }

        .message {
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        h2 {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        @media (max-width: 768px) {
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- بخش کاربر -->
        <div class="user-section">
            <div class="user-info" id="userInfo">👤 مهمان</div>
            <div>
                <button id="loginBtn" onclick="openAuthModal()" style="background:#fff; color:#1a1a2e;">🔑 ورود / ثبت‌نام</button>
                <button id="logoutBtn" onclick="logout()" style="display:none; background:#ff6b6b;">🚪 خروج</button>
            </div>
        </div>

        <div class="header">
            <h1>🎬 <span>سینماچی</span></h1>
            <p>✨ هوشمندترین سیستم توصیه‌گر فیلم ایران ✨</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('movies')">🎬 فیلم‌ها</button>
            <button class="tab-btn" onclick="showTab('search')">🔍 جستجو</button>
            <button class="tab-btn" onclick="showTab('recommend')">🎯 پیشنهاد</button>
            <button class="tab-btn" onclick="showTab('top')">🏆 برترین‌ها</button>
            <button class="tab-btn" onclick="showTab('stats')">📊 آمار</button>
            <button class="tab-btn" onclick="showTab('add')">➕ افزودن</button>
        </div>

        <!-- Modal ورود/ثبت‌نام -->
        <div id="authModal" class="modal">
            <div class="modal-content">
                <h2 id="modalTitle">ورود</h2>
                <input type="text" id="authUsername" placeholder="نام کاربری">
                <input type="password" id="authPassword" placeholder="رمز عبور">
                <button id="authActionBtn" onclick="login()">ورود</button>
                <div class="switch-mode" onclick="toggleAuthMode()">ثبت‌نام ندارید؟ عضویت</div>
                <div id="authMessage"></div>
            </div>
        </div>

        <!-- Tab: Movies -->
        <div id="movies" class="tab-content active">
            <h2>🎬 گنجینه فیلم‌ها</h2>
            <button onclick="loadMovies()" style="margin-bottom: 20px;">🔄 بارگیری مجدد</button>
            <div id="moviesList" class="movies-grid">
                <div class="loading">⏳ در حال بارگیری فیلم‌ها...</div>
            </div>
        </div>

        <!-- Tab: Search -->
        <div id="search" class="tab-content">
            <h2>🔍 جستجوی هوشمند</h2>
            <div class="form-group">
                <label>🎞️ نام فیلم</label>
                <input type="text" id="searchName" placeholder="مثال: ماتریکس">
            </div>
            <div class="form-group">
                <label>🎭 ژانر</label>
                <select id="searchGenre">
                    <option value="">همه</option>
                    <option>عاشقانه</option>
                    <option>درام</option>
                    <option>جنایی</option>
                    <option>علمی تخیلی</option>
                </select>
            </div>
            <div class="form-group">
                <label>⭐ حداقل امتیاز</label>
                <input type="number" id="searchRating" step="0.1" placeholder="مثال: 8">
            </div>
            <button onclick="searchMovies()">🔍 جستجو کن</button>
            <div id="searchResults" class="movies-grid"></div>
        </div>

        <!-- Tab: Recommend -->
        <div id="recommend" class="tab-content">
            <h2>🎯 پیشنهاد ویژه سینماچی</h2>
            <div class="form-group">
                <label>🎭 ژانر مورد علاقه‌ات رو انتخاب کن</label>
                <select id="recommendGenre">
                    <option>عاشقانه</option>
                    <option>درام</option>
                    <option>جنایی</option>
                    <option>علمی تخیلی</option>
                </select>
            </div>
            <button onclick="recommendMovies()">✨ دریافت پیشنهاد ✨</button>
            <div id="recommendResults" class="movies-grid"></div>
        </div>

        <!-- Tab: Top -->
        <div id="top" class="tab-content">
            <h2>🏆 بهترین‌های سینما</h2>
            <div class="form-group">
                <label>🔢 تعداد فیلم مورد نظر</label>
                <input type="number" id="topCount" value="5" min="1" max="20">
            </div>
            <button onclick="loadTopMovies()">🏆 نمایش برترین‌ها</button>
            <div id="topResults" class="movies-grid"></div>
        </div>

        <!-- Tab: Stats -->
        <div id="stats" class="tab-content">
            <h2>📊 داشبورد تحلیلی</h2>
            <button onclick="loadStats()">🔄 بارگیری آمار</button>
            <div id="statsResults"></div>
        </div>

        <!-- Tab: Add Movie -->
        <div id="add" class="tab-content">
            <h2>➕ افزودن فیلم جدید به گنجینه</h2>
            <div class="form-group">
                <label>🎞️ نام فیلم</label>
                <input type="text" id="newName" placeholder="نام فیلم رو وارد کن...">
            </div>
            <div class="form-group">
                <label>🎭 ژانر</label>
                <select id="newGenre">
                    <option>عاشقانه</option>
                    <option>درام</option>
                    <option>جنایی</option>
                    <option>علمی تخیلی</option>
                </select>
            </div>
            <div class="form-group">
                <label>⭐ امتیاز (0 تا 10)</label>
                <input type="number" id="newRating" step="0.1" min="0" max="10" placeholder="مثال: 8.5">
            </div>
            <button onclick="addMovie()">➕ افزودن به سینماچی</button>
            <div id="addResult"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://movie-recommender-final-ic8x.onrender.com';
        let isLoginMode = true;

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function displayMovies(movies, containerId) {
            const container = document.getElementById(containerId);
            if (!movies || movies.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:40px;">😔 هیچ فیلمی پیدا نشد...</p>';
                return;
            }
            
            container.innerHTML = movies.map(movie => `
                <div class="movie-card">
                    <h3>🎬 ${movie.name}</h3>
                    <div class="genre">🎭 ${movie.genre}</div>
                    <div class="rating">⭐ ${movie.rating}/10</div>
                </div>
            `).join('');
        }

        async function loadMovies() {
            const response = await fetch(`${API_URL}/movies`);
            const movies = await response.json();
            displayMovies(movies, 'moviesList');
        }

        async function searchMovies() {
            const name = document.getElementById('searchName').value;
            const genre = document.getElementById('searchGenre').value;
            const rating = document.getElementById('searchRating').value;
            
            let url = `${API_URL}/search/?`;
            if (name) url += `name=${name}&`;
            if (genre) url += `genre=${genre}&`;
            if (rating) url += `min_rating=${rating}&`;
            
            const response = await fetch(url);
            const data = await response.json();
            displayMovies(data.results, 'searchResults');
        }

        async function recommendMovies() {
            const genre = document.getElementById('recommendGenre').value;
            const response = await fetch(`${API_URL}/recommend`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({genre: genre})
            });
            const data = await response.json();
            displayMovies(data.پیشنهادها, 'recommendResults');
        }

        async function loadTopMovies() {
            const count = document.getElementById('topCount').value;
            const response = await fetch(`${API_URL}/top/${count}`);
            const data = await response.json();
            displayMovies(data.top, 'topResults');
        }

        async function loadStats() {
            const response = await fetch(`${API_URL}/stats`);
            const data = await response.json();
            document.getElementById('statsResults').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>${data.total_movies}</h3>
                        <p>🎬 تعداد فیلم‌ها</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.average_rating}</h3>
                        <p>⭐ میانگین امتیاز</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.highest_rating}</h3>
                        <p>🏆 بالاترین امتیاز</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.lowest_rating}</h3>
                        <p>📉 پایین‌ترین امتیاز</p>
                    </div>
                </div>
                <h3>📊 توزیع ژانرها:</h3>
                <div class="stats-grid">
                    ${data.genres_distribution.map(g => `
                        <div class="stat-card">
                            <h3>${g.count}</h3>
                            <p>🎭 ${g.genre}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function addMovie() {
            const name = document.getElementById('newName').value;
            const genre = document.getElementById('newGenre').value;
            const rating = parseFloat(document.getElementById('newRating').value);
            
            if (!name || !rating) {
                alert('❌ لطفاً نام و امتیاز فیلم رو وارد کن!');
                return;
            }
            
            const response = await fetch(`${API_URL}/add_movie`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, genre, rating})
            });
            const data = await response.json();
            
            const resultDiv = document.getElementById('addResult');
            if (data.error) {
                resultDiv.innerHTML = `<div class="message error">❌ ${data.error}</div>`;
            } else {
                resultDiv.innerHTML = `<div class="message success">✅ ${data.message} 🎉</div>`;
                document.getElementById('newName').value = '';
                document.getElementById('newRating').value = '';
                setTimeout(() => {
                    resultDiv.innerHTML = '';
                    loadMovies();
                }, 2000);
            }
        }

        // ========== بخش احراز هویت محلی ==========
        function openAuthModal() {
            document.getElementById('authModal').classList.add('active');
            document.getElementById('authMessage').innerHTML = '';
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('modalTitle');
            const btn = document.getElementById('authActionBtn');
            const switchText = document.querySelector('.switch-mode');
            
            if (isLoginMode) {
                title.innerText = 'ورود';
                btn.innerText = 'ورود';
                btn.setAttribute('onclick', 'login()');
                switchText.innerText = 'ثبت‌نام ندارید؟ عضویت';
            } else {
                title.innerText = 'ثبت‌نام';
                btn.innerText = 'عضویت';
                btn.setAttribute('onclick', 'register()');
                switchText.innerText = 'قبلاً عضو شدید؟ ورود';
            }
        }

        async function register() {
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;
            
            if (!username || !password) {
                document.getElementById('authMessage').innerHTML = '<div class="message error">❌ لطفاً همه فیلدها را پر کن!</div>';
                return;
            }
            
            const response = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await response.json();
            
            if (data.error) {
                document.getElementById('authMessage').innerHTML = `<div class="message error">❌ ${data.error}</div>`;
            } else {
                document.getElementById('authMessage').innerHTML = `<div class="message success">✅ ثبت‌نام موفق! حالا وارد شو.</div>`;
                setTimeout(() => {
                    isLoginMode = true;
                    toggleAuthMode();
                }, 1500);
            }
        }

        async function login() {
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;
            
            if (!username || !password) {
                document.getElementById('authMessage').innerHTML = '<div class="message error">❌ لطفاً نام کاربری و رمز عبور را وارد کن!</div>';
                return;
            }
            
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await response.json();
            
            if (data.error) {
                document.getElementById('authMessage').innerHTML = `<div class="message error">❌ ${data.error}</div>`;
            } else {
                localStorage.setItem('token', data.access_token);
                document.getElementById('userInfo').innerHTML = `👤 خوش اومدی ${username}`;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                closeAuthModal();
            }
        }

        async function logout() {
            localStorage.removeItem('token');
            document.getElementById('userInfo').innerHTML = '👤 مهمان';
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
        }

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('userInfo').innerHTML = '👤 کاربر عزیز';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-block';
            }
        }

        // بارگیری خودکار فیلم‌ها و بررسی وضعیت ورود
        loadMovies();
        checkAuth();
    </script>
</body>
</html>
